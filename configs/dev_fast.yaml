render:
  width: 256
  height: 256
  alpha_threshold: 0.5
  sh_degree: 0

background:
  mode: "image"
  image_dir: "assets/backgrounds/"
  resize_mode: "crop"
  solid_color: [0.1, 0.1, 0.1]

scene:
  num_objects_min: 2
  num_objects_max: 5
  position_range: [-1.0, 1.0]
  rotation_deg_max: 45
  scale_jitter: [0.6, 0.9]

camera:
  fov_deg_range: [50, 70]
  distance_range: [2.5, 5.0]
  max_retries: 20

generation:
  max_camera_retries: 20
  max_gaussians_per_object: 100000
