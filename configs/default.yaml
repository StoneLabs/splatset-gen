render:
  width: 512
  height: 512
  alpha_threshold: 0.5
  sh_degree: 0

background:
  mode: "image"
  image_dir: "assets/backgrounds/"
  resize_mode: "crop"
  solid_color: [0.1, 0.1, 0.1]

scene:
  num_objects_min: 2
  num_objects_max: 5
  position_range: [-2.0, 2.0]
  rotation_deg_max: 180
  scale_jitter: [0.8, 1.2]

camera:
  fov_deg_range: [45, 75]
  distance_range: [3.0, 8.0]
  max_retries: 20

generation:
  max_camera_retries: 20
  # Optional testing cap — random subset of N Gaussians per PLY; omit for full quality:
  # max_gaussians_per_object: 8000
