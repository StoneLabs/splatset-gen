# splat-dataset generation config
# Used by: scripts/generate_dataset.py (copied to output/config.yaml per run)
# Paths in image_dir are relative to the project root unless absolute.
#
# PLY loading (not configured here): each .ply is centered and scaled so its
# longest bounding-box axis is 1 unit before scene placement.

render:
  # Output image size in pixels (also used for camera intrinsics).
  width: 512
  height: 512

  # Minimum splat alpha for a pixel to count as foreground.
  # Used for: rejecting empty renders, sampling random click points (x, y).
  # Must be in (0, 1). Higher → stricter “visible object” threshold.
  alpha_threshold: 0.5

  # Spherical-harmonics color degree (0–3). 0 = DC only; higher needs f_rest_* in PLY.
  sh_degree: 3

  # Object mask output (masks/{id}.png, grayscale L):
  #   binary — 0 or 255; crisp labels for standard click-to-segment training
  #   soft   — 0–255 proportional to splat compositing weight on dominant pixels;
  #            preserves semi-transparent edges; occluded regions stay 0
  mask_mode: binary

  # Per-object compositing weight cutoff (same signal as rasterizer object_weights).
  #   binary — pixel must exceed this to become 255
  #   soft   — values below this are zeroed as noise; dominant pixels above map to 1–255
  mask_weight_threshold: 0.05

background:
  # Compositing mode after the splat pass.
  #   solid — flat color everywhere splats do not cover
  #   image — random file from image_dir (requires RNG per sample)
  #   random_pixels — independent random RGB per pixel (requires RNG per sample)
  mode: "image"

  # Directory of background images (.jpg, .png, .webp, …).
  # One image is chosen at random per sample when mode is "image".
  image_dir: "assets/backgrounds/"

  # How to fit a background image to render width×height:
  #   crop      — scale to cover, center-crop (default)
  #   letterbox — scale to fit, pad with solid_color
  #   stretch   — non-uniform scale to exact size
  resize_mode: "crop"

  # RGB in [0, 1]. Used for mode "solid" and as letterbox pad color for mode "image".
  solid_color: [0.1, 0.1, 0.1]

scene:
  # Number of PLY objects placed per sample (inclusive range, uniform random).
  # Each slot picks a random file from the --ply-dir pool (with replacement).
  num_objects_min: 2
  num_objects_max: 5

  # Random translation per object, applied independently on X, Y, Z (world units).
  # Objects are already centered at origin after load; this spreads them in the scene.
  position_range: [-2.0, 2.0]

  # Max absolute Euler rotation (degrees) per axis, sampled uniformly in [-max, +max].
  rotation_deg_max: 180

  # Uniform random scale multiplier per object, applied after unit-extent normalization.
  scale_jitter: [0.8, 1.2]

camera:
  # Vertical field of view (degrees), sampled uniformly per camera attempt.
  fov_deg_range: [45, 75]

  # Camera distance from scene bbox center (world units), sampled uniformly.
  # Actual distance is at least 1.5× the scene radius so small scenes stay framed.
  distance_range: [3.0, 8.0]

  # Attempts to sample a camera whose projected scene overlaps the image.
  # Used inside sample_random_camera(); raises if all attempts fail.
  max_retries: 20

  # Optional: random offset added to look-at target (scene centroid). Default 0 if omitted.
  # look_at_jitter: 0.0

generation:
  # Outer retry loop per sample: re-randomize camera (same scene) on failure.
  # Failures include: no valid camera, alpha too low, click/mask sanity checks.
  max_camera_retries: 20

  # Optional speed/testing cap: load at most N Gaussians per PLY (random subset, seeded).
  # Omit entirely for full-quality loads of every Gaussian in each file.
  # max_gaussians_per_object: 8000

  augmentation:
    # Training-time randomization applied after compositing (except gaussian_subset).
    # Master switch: when false, no augmentation runs (including gaussian_subset).
    # RNG is deterministic per run seed + sample id (worker-independent).
    enabled: true

    # Pre-render: draw each PLY with a random fraction of its Gaussians.
    # Runs at scene build; independent probability roll per object slot.
    # Base count = max_gaussians_per_object when set, else full PLY vertex count.
    gaussian_subset:
      enabled: true
      # Chance this object uses a subset instead of the full load base.
      probability: 0.4
      # Uniform random fraction of the base to actually rasterize.
      fraction_range: [0.1, 1.0]

    # Photometric color grading on composited RGB (mask unchanged).
    lighting:
      enabled: true
      probability: 0.4
      # Additive offset in [0, 1] RGB space after contrast.
      brightness_range: [-0.25, 0.25]
      # Multiplier on (pixel − 0.5) before brightness.
      contrast_range: [0.75, 1.25]
      # Output raised to 1/gamma; <1 lifts shadows, >1 darkens midtones.
      gamma_range: [0.85, 1.15]
      # 1.0 = unchanged; <1 desaturates, >1 boosts color vs gray.
      saturation_range: [0.6, 1.4]
      # Shifts R up / B down (negative reverses); simulates warm/cool cast.
      warmth_range: [-0.2, 0.2]

    # Gaussian or motion blur; same kernel applied to RGB and mask.
    blur:
      enabled: true
      probability: 0.4
      # Gaussian-blur radius in pixels (used when motion blur not chosen).
      radius_range: [0.5, 2.5]
      # Chance of motion blur vs isotropic Gaussian when blur triggers.
      motion_probability: 0.5
      motion_length_range: [3, 15]
      motion_angle_range: [0, 180]

    # Band-shift tear: splits image into strips and shifts them (RGB + mask).
    tear:
      enabled: true
      probability: 0.4
      num_bands_range: [2, 6]
      # Pixel shift per band; sign is random per band.
      shift_range: [-5, 5]
      # True = horizontal bands; false = vertical.
      horizontal_probability: 0.5

    # One geometric warp per sample, chosen uniformly from enabled subtypes.
    # RGB and mask warped together so labels stay aligned.
    warp:
      enabled: true
      probability: 0.3
      perspective:
        enabled: true
        # Random corner displacement as fraction of image width/height.
        corner_jitter_range: [0.02, 0.12]
      barrel:
        enabled: true
        # Negative radial strength (barrel / outward bulge).
        strength_range: [-0.2, -0.02]
      pincushion:
        enabled: true
        # Positive radial strength (pincushion / inward pinch).
        strength_range: [0.02, 0.15]
      affine:
        enabled: true
        rotate_deg_range: [-8, 8]
        scale_range: [0.90, 1.10]
        shear_range: [-0.08, 0.08]
        # Translation as fraction of image width/height.
        translate_frac_range: [-0.04, 0.04]

    # Channel shift in pixels (RGB-only; mask unchanged).
    chromatic_aberration:
      enabled: true
      probability: 0.4
      shift_range: [1, 4]
      horizontal_probability: 0.5

    # Additive Gaussian noise in RGB (mask unchanged).
    noise:
      enabled: true
      probability: 0.4
      std_range: [0.01, 0.06]

    # JPEG re-encode/decode round-trip (RGB-only).
    jpeg:
      enabled: true
      probability: 0.4
      quality_range: [10, 85]

    # Edge darkening vignette (RGB-only).
    vignette:
      enabled: true
      probability: 0.4
      strength_range: [0.2, 0.6]
      # Radial falloff start as fraction of half-diagonal (0=center, 1=edge).
      falloff_start_range: [0.25, 0.45]

    # Random colored lines over RGB; erases clicked-object mask under each line.
    # Applied after other augmentations; lines never cross the click pixel.
    lines:
      enabled: true
      probability: 0.5
      count_range: [1, 15]
      angle_deg_range: [0, 180]
      thickness_range: [1, 6]
      color_range: [0.00, 1.0]
      # True = independent R/G/B; false = single shared luminance.
      color_per_channel: true
      max_attempts_per_line: 32
  