render:
  width: 512
  height: 512
  alpha_threshold: 0.5
  sh_degree: 3
  mask_mode: soft
  mask_weight_threshold: 0.01

background:
  mode: "image"
  image_dir: "assets/backgrounds/"
  resize_mode: "crop"
  solid_color: [0.1, 0.1, 0.1]

scene:
  num_objects_min: 2
  num_objects_max: 3
  position_range: [-10.0, 10.0]
  rotation_deg_max: 45
  scale_jitter: [0.25, 16]

camera:
  fov_deg_range: [45, 69]
  distance_range: [4.0, 8.0]
  max_retries: 20
  look_at_jitter: 5

generation:
  max_camera_retries: 20
  #max_gaussians_per_object: 25000

augmentation:
  enabled: true

  gaussian_subset:
    enabled: false
    probability: 1
    fraction_range: [0.01, 1]

  lighting:
    enabled: true
    probability: 1
    brightness_range: [-0.75, 0.75]
    contrast_range: [0.25, 1.75]
    gamma_range: [0.25, 1.75]
    saturation_range: [0, 2]
    warmth_range: [-1, 1]

  blur:
    enabled: true
    probability: 0.4
    radius_range: [0.5, 5]
    motion_probability: 0.5
    motion_length_range: [3, 15]
    motion_angle_range: [0, 180]

  tear:
    enabled: true
    probability: 0.4
    num_bands_range: [2, 6]
    shift_range: [-5, 5]
    horizontal_probability: 0.5

  warp:
    enabled: true
    probability: 0.3
    perspective:
      enabled: true
      corner_jitter_range: [0.02, 0.12]
    barrel:
      enabled: true
      strength_range: [-0.2, -0.02]
    pincushion:
      enabled: true
      strength_range: [0.02, 0.15]
    affine:
      enabled: true
      rotate_deg_range: [-8, 8]
      scale_range: [0.90, 1.10]
      shear_range: [-0.08, 0.08]
      translate_frac_range: [-0.04, 0.04]

  chromatic_aberration:
    enabled: true
    probability: 0.4
    shift_range: [1, 4]
    horizontal_probability: 0.5

  noise:
    enabled: true
    probability: 1
    std_range: [0.01, 0.06]

  jpeg:
    enabled: true
    probability: 1
    quality_range: [3, 100]

  vignette:
    enabled: true
    probability: 1
    strength_range: [0.2, 0.6]
    falloff_start_range: [0.25, 0.45]

  lines:
    enabled: true
    probability: 0.5
    count_range: [1, 15]
    angle_deg_range: [0, 180]
    thickness_range: [1, 6]
    color_range: [0.00, 1.0]
    color_per_channel: true
    max_attempts_per_line: 32
