render:
  width: 512
  height: 512
  alpha_threshold: 0.5
  sh_degree: 0
  mask_mode: soft
  mask_weight_threshold: 0.05

background:
  mode: "image"
  image_dir: "assets/backgrounds/"
  resize_mode: "crop"
  solid_color: [0.1, 0.1, 0.1]

scene:
  num_objects_min: 2
  num_objects_max: 6
  position_range: [-8.0, 8.0]
  rotation_deg_max: 180
  scale_jitter: [0.25, 12]

camera:
  fov_deg_range: [45, 75]
  distance_range: [3.0, 8.0]
  max_retries: 20
  # look_at_jitter: 0.0

generation:
  max_camera_retries: 20
  #max_gaussians_per_object: 8000


augmentation:
  enabled: false